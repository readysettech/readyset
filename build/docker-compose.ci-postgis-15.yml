services:
  postgres:
    image: ${DOCKER_HUB_BASE:-docker.io}/postgis/postgis:15-3.5
    environment:
      - POSTGRES_PASSWORD=noria
      - POSTGRES_DB=noria
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
  app:
    depends_on:
      - postgres
    environment:
      - AUTHORITY=standalone
      - ALLOW_UNAUTHENTICATED_CONNECTIONS=true
      - POSTGRESQL_HOST=postgres
      - PGHOST=postgres
