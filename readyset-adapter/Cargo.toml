[package]
name = "readyset-adapter"
version = "0.1.0"
publish = false
authors = ["Readyset Technology, Inc. <info@readyset.io>"]
edition = "2024"

[dependencies]
ahash = { workspace = true }
anyhow = { workspace = true }
async-trait = { workspace = true }
bincode = { workspace = true }
chrono = { workspace = true }
chrono-tz = { workspace = true }
clap = { workspace = true, features = ["derive", "env"] }
crossbeam-skiplist = { workspace = true }
dashmap = { workspace = true }
fail = { workspace = true }
futures = { workspace = true }
futures-util = { workspace = true }
hyper = { workspace = true, features = ["stream", "server", "http1"] }
indexmap = { workspace = true }
itertools = { workspace = true }
lru = { workspace = true }
metrics = { workspace = true }
metrics-exporter-prometheus = { workspace = true }
mysql_common = { workspace = true }
parking_lot = { workspace = true }
rand = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
slab = { workspace = true }
sqlformat = { workspace = true }
sqlparser = { workspace = true }
streaming-iterator = { workspace = true }
tokio = { workspace = true, features = ["full"] }
tokio-stream = { workspace = true, features = ["net"] }
tower = { workspace = true, features = ["util"] }
tracing = { workspace = true, features = ["release_max_level_debug"] }
vec1 = { workspace = true }
xxhash-rust = { workspace = true }

database-utils = { path = "../database-utils" }
dataflow-expression = { path = "../dataflow-expression" }
failpoint-macros = { path = "../failpoint-macros" }
health-reporter = { path = "../health-reporter" }
readyset-adapter-types = { path = "../readyset-adapter-types" }
readyset-alloc = { path = "../readyset-alloc" }
readyset-client = { path = "../readyset-client" }
readyset-client-metrics = { path = "../readyset-client-metrics" }
readyset-common = { path = "../readyset-common" }
readyset-data = { path = "../readyset-data/" }
readyset-dataflow = { path = "../readyset-dataflow" }
readyset-errors = { path = "../readyset-errors" }
readyset-schema = { path = "../readyset-schema" }
readyset-server = { path = "../readyset-server" }
readyset-shallow = { path = "../readyset-shallow" }
readyset-sql = { path = "../readyset-sql" }
readyset-sql-parsing = { path = "../readyset-sql-parsing" }
readyset-sql-passes = { path = "../readyset-sql-passes" }
readyset-telemetry-reporter = { path = "../readyset-telemetry-reporter" }
readyset-tracing = { path = "../readyset-tracing" }
readyset-util = { path = "../readyset-util" }
readyset-version = { path = "../readyset-version" }
schema-catalog = { path = "../schema-catalog" }

[dev-dependencies]
criterion = { workspace = true }
proptest = { workspace = true }
rand = { workspace = true }
test-strategy = { workspace = true }

[lib]
path = "src/lib.rs"

[[bench]]
name = "parse"
harness = false

[[bench]]
name = "hash"
harness = false

[features]
failure_injection = ["fail/failpoints", "readyset-util/failure_injection", "schema-catalog/failure_injection"]

[lints]
workspace = true
